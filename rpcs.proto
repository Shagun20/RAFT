syntax = "proto3";

message RequestVoteRequest {
    int32 candidate_id = 1; 
    int32 term = 2;
    int32 last_log_index = 3;
    int32 last_log_term = 4;    
}

message RequestVoteResponse {
    int32 term = 1;
    bool vote_granted = 2;
    double lease_timer = 3;
}

message Entry {
    int32 term = 1;
    repeated string update = 2;

}

message AppendEntriesRequest {

    int32 leaderTerm = 1;
    int32 leaderId = 2;
    int32 prevLogIndex = 3;
    int32 prevLogTerm = 4;
    repeated Entry entries = 5;
    int32 leaderCommit= 6;
    double leaseDuration=7;
}

message AppendEntriesResponse {
    int32 term = 1;
    bool success = 2;
}
message ServeClientRequest {
    string type = 1;
    string variable = 2;
    string value = 3;
}

message ServeClientResponse{
    string response = 1;
    int32 leader_id = 2;
    bool is_success = 3;
}

service Raft {
    rpc RequestVote (RequestVoteRequest) returns (RequestVoteResponse);
    rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);
    rpc ServeClient (ServeClientRequest) returns (ServeClientResponse);
}